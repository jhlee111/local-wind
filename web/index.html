<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>local-wind — South Bay</title>
  </head>
  <body>
    <div id="map"></div>
    <div id="panel">
      <div id="tl-head">
        <div id="tl-time">loading wind data…</div>
        <div id="tl-sub"></div>
      </div>
      <div id="timeline"></div>
    </div>
    <div id="legend-corner">
      <button id="legend-toggle" aria-expanded="false" aria-label="wind speed legend">
        <span id="legend-chip"></span><span>kt</span>
      </button>
      <div id="legend" hidden>
        <div id="legend-bar"></div>
        <div id="legend-ticks"></div>
        <div id="legend-unit">wind speed (kt)</div>
      </div>
    </div>
    <div id="spot-panel" hidden>
      <div id="sheet-grip" aria-hidden="true"></div>
      <div id="sp-head">
        <div>
          <div id="sp-name">Spot</div>
          <div id="sp-now">—</div>
        </div>
        <button id="sp-close" aria-label="close panel">×</button>
      </div>
      <div id="sp-chart-wrap">
        <svg id="sp-chart" viewBox="0 0 380 190" role="img" aria-label="wind speed time series"></svg>
        <div id="sp-tooltip" hidden></div>
      </div>
      <div id="sp-legend">
        <span id="sp-chart-day"></span>
        <span><i class="sw" id="sw-obs"></i><span id="sp-obs-label">obs</span></span>
        <span><i class="sw" id="sw-fcst"></i>HRRR</span>
        <span class="sp-hint">dots = gusts · kt</span>
      </div>
      <div id="sp-table" hidden></div>
    </div>
    <div id="credit">NOAA HRRR · © OpenFreeMap · OpenStreetMap</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
