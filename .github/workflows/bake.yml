# Bake HRRR wind data for the web map.
#
# M1 stub: manual trigger only, output as artifact.
# M2 TODO: enable the hourly cron + deploy web/dist + data to Cloudflare Pages
#          (needs CF account + CLOUDFLARE_API_TOKEN secret; see docs/PLAN.md D4).

name: bake-wind

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "20 * * * *"  # hourly, ~20 min past (HRRR availability lag ~1 h)

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Bake wind rasters from latest HRRR
        run: uv run --project pipeline python -m localwind.bake --frames 13

      - uses: actions/upload-artifact@v4
        with:
          name: wind-data
          path: web/public/data/
          retention-days: 2
